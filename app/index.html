<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get IRON ZONE — Steam Ironing App</title>
  <meta name="description" content="Download the IRON ZONE app for iOS or Android. Book steam ironing with pickup and delivery.">
  <meta name="apple-itunes-app" content="app-id=6752514444">
  <link rel="icon" type="image/jpeg" href="/ironLogo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lime: #98c15d;
      --lime-soft: rgba(152, 193, 93, 0.18);
      --black: #0a0a0a;
      --white: #fafafa;
      --muted: #5c5c5c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--white);
      color: var(--black);
      overflow-x: hidden;
    }

    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--lime-soft), transparent 55%),
        radial-gradient(ellipse 90% 60% at 100% 100%, rgba(10, 10, 10, 0.04), transparent 50%),
        linear-gradient(180deg, #ffffff 0%, #f4f4f2 100%);
    }

    .steam {
      position: absolute;
      bottom: 0;
      left: -10%;
      width: 45%;
      height: 40%;
      opacity: 0.1;
      pointer-events: none;
    }

    .steam path {
      fill: none;
      stroke: var(--black);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 3rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 28px;
      padding: 2.5rem 2rem 2rem;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 20px 44px -14px rgba(10, 10, 10, 0.12),
        0 0 0 1px rgba(10, 10, 10, 0.06);
      text-align: center;
    }

    .logo-ring {
      width: 132px;
      height: 132px;
      margin: 0 auto 1.5rem;
      border-radius: 36px;
      background: linear-gradient(145deg, #fff 0%, #f0f0ee 100%);
      display: grid;
      place-items: center;
      box-shadow: 0 12px 28px rgba(10, 10, 10, 0.08);
    }

    .logo-ring img {
      width: 96px;
      height: auto;
      display: block;
    }

    .kicker {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      color: var(--lime);
      margin-bottom: 0.35rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 3.25rem);
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 0.75rem;
    }

    .sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 1.75rem;
      max-width: 28ch;
      margin-left: auto;
      margin-right: auto;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--black);
      margin-bottom: 1.5rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.65rem;
      justify-content: center;
      width: 100%;
    }

    .store-badge {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.7rem 0.85rem;
      min-height: 3.35rem;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      flex: 1 1 calc(50% - 0.35rem);
      min-width: 8.5rem;
      max-width: 100%;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      transition: filter 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .store-badge:hover {
      filter: brightness(1.04);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.16);
      transform: translateY(-1px);
    }

    .store-badge:active {
      transform: translateY(0);
      filter: brightness(0.96);
    }

    .store-badge:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 3px;
    }

    .store-badge.is-hidden {
      display: none !important;
    }

    .store-badge--apple {
      background: #2ecc71;
    }

    .store-badge--google {
      background: #2c3e50;
    }

    .store-badge__icons {
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
    }

    .store-badge__icons svg {
      grid-area: 1 / 1;
      width: 30px;
      height: 30px;
      display: block;
      fill: currentColor;
    }

    .store-badge__icons svg.is-hidden {
      display: none;
    }

    .store-badge__text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      text-align: left;
      line-height: 1.2;
      min-width: 0;
    }

    .store-badge__line1 {
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      opacity: 0.95;
      white-space: nowrap;
    }

    .store-badge__line2 {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      margin-top: 0.1rem;
      white-space: nowrap;
    }

    @media (max-width: 380px) {
      .actions {
        flex-direction: column;
      }

      .store-badge {
        flex: 1 1 auto;
        width: 100%;
      }
    }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #888;
    }

    .hint a {
      color: var(--black);
      font-weight: 500;
      text-underline-offset: 0.2em;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    .hint a:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 2px;
      border-radius: 2px;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #aaa;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--black);
    }

    footer a:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="bg-stage" aria-hidden="true">
    <svg class="steam" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 180 Q40 140 30 100 Q25 70 45 50" />
      <path d="M50 185 Q65 150 55 110 Q50 75 70 55" />
      <path d="M80 188 Q95 155 85 115 Q78 80 95 60" />
    </svg>
  </div>

  <main class="wrap">
    <div class="card">
      <div class="logo-ring">
        <img src="/ironLogo.jpg" alt="IRON ZONE logo" width="96" height="96" fetchpriority="high">
      </div>
      <p class="kicker">STEAM IRONING</p>
      <h1>IRON ZONE</h1>
      <p class="sub" id="sub">Taking you to the right store for your phone. Book pickups, track orders, and more.</p>

      <div class="status" id="status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Opening store…</span>
      </div>

      <div class="actions">
        <a class="store-badge store-badge--apple" id="btn-primary" href="#">
          <span class="store-badge__icons" aria-hidden="true">
            <svg class="icon-apple" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <svg class="icon-google is-hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
              <path d="M3 4.2v15.6c0 .45.48.73.87.5l14.4-7.8c.4-.22.4-.78 0-1L3.87 3.7A.55.55 0 0 0 3 4.2z"/>
            </svg>
          </span>
          <span class="store-badge__text">
            <span class="store-badge__line1" data-line1>Continue</span>
            <span class="store-badge__line2" data-line2>to store</span>
          </span>
        </a>
        <a class="store-badge store-badge--google is-hidden" id="btn-alt" href="#" aria-hidden="true">
          <span class="store-badge__icons" aria-hidden="true">
            <svg class="icon-apple is-hidden" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <svg class="icon-google" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" focusable="false">
              <path d="M3 4.2v15.6c0 .45.48.73.87.5l14.4-7.8c.4-.22.4-.78 0-1L3.87 3.7A.55.55 0 0 0 3 4.2z"/>
            </svg>
          </span>
          <span class="store-badge__text">
            <span class="store-badge__line1" data-line1>Get it on</span>
            <span class="store-badge__line2" data-line2>Google Play</span>
          </span>
        </a>
      </div>

      <p class="hint">Stuck? <a href="/">Back to website</a></p>
    </div>
    <footer>
      <a href="/">ironzone.in</a>
    </footer>
  </main>

  <script>
    (function () {
      var IOS_URL = 'https://apps.apple.com/us/app/ironzone-steam-ironing/id6752514444';
      var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.infyzen.ironzone';

      function isIOS() {
        var ua = navigator.userAgent || '';
        if (/iPad|iPhone|iPod/i.test(ua)) return true;
        if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return true;
        return false;
      }

      function isAndroid() {
        return /Android/i.test(navigator.userAgent || '');
      }

      var btnPrimary = document.getElementById('btn-primary');
      var btnAlt = document.getElementById('btn-alt');
      var statusEl = document.getElementById('status');
      var subEl = document.getElementById('sub');

      function setBadgeLines(el, line1, line2) {
        var a = el.querySelector('[data-line1]');
        var b = el.querySelector('[data-line2]');
        if (a) a.textContent = line1;
        if (b) b.textContent = line2;
      }

      function setBadgeStore(el, store) {
        var apple = el.querySelector('.icon-apple');
        var google = el.querySelector('.icon-google');
        el.classList.remove('store-badge--apple', 'store-badge--google');
        el.classList.add(store === 'apple' ? 'store-badge--apple' : 'store-badge--google');
        if (apple) apple.classList.toggle('is-hidden', store !== 'apple');
        if (google) google.classList.toggle('is-hidden', store !== 'google');
      }

      function showAltBadge() {
        btnAlt.classList.remove('is-hidden');
        btnAlt.removeAttribute('aria-hidden');
      }

      if (isIOS()) {
        var storeUrl = IOS_URL;
        var altUrl = ANDROID_URL;
        btnPrimary.href = storeUrl;
        setBadgeStore(btnPrimary, 'apple');
        setBadgeLines(btnPrimary, 'Open in', 'App Store');
        btnAlt.href = altUrl;
        setBadgeStore(btnAlt, 'google');
        setBadgeLines(btnAlt, 'Get it on', 'Google Play');
        showAltBadge();
        function go() {
          window.location.replace(storeUrl);
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () { setTimeout(go, 400); });
        } else {
          setTimeout(go, 400);
        }
      } else if (isAndroid()) {
        var androidUrl = ANDROID_URL;
        var iosAlt = IOS_URL;
        btnPrimary.href = androidUrl;
        setBadgeStore(btnPrimary, 'google');
        setBadgeLines(btnPrimary, 'Open in', 'Google Play');
        btnAlt.href = iosAlt;
        setBadgeStore(btnAlt, 'apple');
        setBadgeLines(btnAlt, 'Download on the', 'App Store');
        showAltBadge();
        function goAndroid() {
          window.location.replace(androidUrl);
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function () { setTimeout(goAndroid, 400); });
        } else {
          setTimeout(goAndroid, 400);
        }
      } else {
        statusEl.style.display = 'none';
        subEl.textContent =
          'Download the IRON ZONE app on your phone. Book pickups, track orders, and more — pick your store below.';
        btnPrimary.href = IOS_URL;
        setBadgeStore(btnPrimary, 'apple');
        setBadgeLines(btnPrimary, 'Download on the', 'App Store');
        btnAlt.href = ANDROID_URL;
        setBadgeStore(btnAlt, 'google');
        setBadgeLines(btnAlt, 'Get it on', 'Google Play');
        showAltBadge();
      }
    })();
  </script>
</body>
</html>
